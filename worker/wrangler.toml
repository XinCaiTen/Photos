name = "photostack-worker"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ─── R2 Binding ───────────────────────────────────────────────
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "photostack-images"  

# ─── Environment Variables (không nhạy cảm) ──────────────────
[vars]
# Danh sách origin được phép gọi API (ngăn cách bằng dấu phẩy)
ALLOWED_ORIGINS = "http://localhost:5173,https://xincaiten.github.io"

# ─── Secrets (nhạy cảm - lưu mã hoá trên Cloudflare) ─────────
# PUBLIC_URL được set bằng lệnh:
#   npx wrangler secret put PUBLIC_URL
# KHÔNG đặt trực tiếp ở đây để tránh lộ khi push Git
